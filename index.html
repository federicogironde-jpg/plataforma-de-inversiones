*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
.ip-root{max-width:1180px;margin:0 auto;border:1px solid var(--border);border-radius:16px;overflow:hidden;min-height:100vh;}
.ip-display{font-family:'Space Grotesk',sans-serif;}
.ip-mono{font-family:'JetBrains Mono',monospace;}
.ip-scroll::-webkit-scrollbar{height:6px;width:6px;}
.ip-scroll::-webkit-scrollbar-thumb{background:#2C3546;border-radius:4px;}
.ip-tape-track{display:inline-flex;animation:ip-scroll 28s linear infinite;}
.ip-tape-track:hover{animation-play-state:paused;}
@keyframes ip-scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.ip-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;}
.ip-input,.ip-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:8px 10px;font-size:13px;font-family:'Inter',sans-serif;outline:none;width:100%;}
.ip-input:focus,.ip-select:focus{border-color:var(--blue);}
.ip-btn{background:var(--blue);color:#0B0E14;border:none;border-radius:8px;padding:9px 14px;
  font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s;}
.ip-btn:hover{opacity:.88;}
.ip-btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}
.ip-btn-ghost:hover{color:var(--text);border-color:#374056;}
.ip-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block;letter-spacing:.02em;}
.ip-row:hover{background:var(--surface2);}
.ip-tab-btn{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:8px;border:none;
  cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;background:transparent;color:var(--muted);
  font-family:'Inter',sans-serif;}
.ip-tab-btn.active{background:var(--surface2);color:var(--text);}
input[type=range].ip-range{-webkit-appearance:none;width:100%;height:4px;border-radius:4px;background:#232B3D;}
input[type=range].ip-range::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--blue);cursor:pointer;margin-top:-5px;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:10px 14px;font-size:11px;color:var(--muted);font-weight:500;}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);}
.metric-grid{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.metric-card{padding:14px 16px;flex:1;min-width:150px;background:var(--surface);border:1px solid var(--border);border-radius:12px;}
.metric-label{font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.metric-value{font-size:21px;font-weight:600;}
.metric-sub{font-size:12px;margin-top:4px;color:var(--muted);}
.svg-icon{display:inline-block;vertical-align:middle;}

/* ============================================================
   UTILIDADES
   ============================================================ */
function mulberry32(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function seedFromString(str){
  let h = 0;
  for(let i=0;i<str.length;i++){ h = Math.imul(31,h) + str.charCodeAt(i) | 0; }
  return h;
}
function genHistory(assetKey, days, driftAnnual, volAnnual, startPrice){
  const rnd = mulberry32(seedFromString(assetKey));
  const dailyDrift = driftAnnual/252, dailyVol = volAnnual/Math.sqrt(252);
  let price = startPrice;
  const out = [{t:0,price}];
  for(let i=1;i<=days;i++){
    const u1 = Math.max(rnd(),1e-6), u2 = rnd();
    const z = Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2);
    price = price*(1+dailyDrift+dailyVol*z);
    out.push({t:i,price:Math.max(price,0.01)});
  }
  return out;
}
function fmtMoney(v, currency){
  currency = currency || 'USD';
  if(v===null||v===undefined||isNaN(v)) return '—';
  const symbol = currency==='ARS' ? 'AR$' : 'US$';
  return symbol+' '+Number(v).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtPct(v){
  if(v===null||v===undefined||isNaN(v)) return '—';
  const sign = v>0 ? '+' : '';
  return sign+v.toFixed(2)+'%';
}
function uid(){ return Math.random().toString(36).slice(2,10); }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ============================================================

function tickPrices(){
  STOCKS.concat(CEDEARS).forEach(a=>{
    const cur = state.prices[a.ticker];
    const shock = (Math.random()-0.5)*2*a.vol;
    const newPrice = Math.max(cur.price*(1+shock*0.15), 0.01);
    state.prices[a.ticker] = {price:newPrice, chgPct:((newPrice-a.base)/a.base)*100};
  });
  state.ccl = Math.max(state.ccl*(1+(Math.random()-0.5)*0.002), 1000);
  updateHistoryAndAlerts();
  updateTicker();
  refreshActiveTabLive();
}

async function syncCrypto(){
  try{
    const ids = CRYPTO_META.map(c=>c.id).join(',');
    const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids='+ids+'&vs_currencies=usd&include_24hr_change=true');
    if(!res.ok) throw new Error('bad response');
    const data = await res.json();
    CRYPTO_META.forEach(c=>{
      const d = data[c.id];
      if(d && typeof d.usd === 'number'){
        state.prices[c.ticker] = {price:d.usd, chgPct:d.usd_24h_change||0};
      }
    });
    state.cryptoLive = true;
  }catch(e){
    state.cryptoLive = false;
  }
  updateTicker();
  refreshActiveTabLive();
  updateSyncBadge();
}

function updateHistoryAndAlerts(){
  ALL_ASSETS.forEach(a=>{
    const p = state.prices[a.ticker].price;
    const arr = state.priceHist[a.ticker] || [];
    arr.push(p);
    if(arr.length>25) arr.shift();
    state.priceHist[a.ticker] = arr;
  });

  state.alerts.forEach(al=>{
    if(!al.active) return;
    const p = state.prices[al.ticker].price;
    const hit = al.cond==='gt' ? p>=al.value : p<=al.value;
    if(hit){
      const tick = Math.floor(Date.now()/20000);
      const already = state.notifications.find(n=>n.alertId===al.id && n.tick===tick);
      if(!already){
        state.notifications.unshift({id:uid(), alertId:al.id, tick, kind:'alerta',
          text: al.ticker+' '+(al.cond==='gt'?'superó':'cayó por debajo de')+' '+al.value, time:new Date()});
        state.notifications = state.notifications.slice(0,30);
      }
    }
  });

  ALL_ASSETS.forEach(a=>{
    const arr = state.priceHist[a.ticker];
    if(!arr || arr.length<10) return;
    const mean = arr.reduce((s,v)=>s+v,0)/arr.length;
    const std = Math.sqrt(arr.reduce((s,v)=>s+(v-mean)**2,0)/arr.length);
    const relVol = std/mean;
    if(relVol>0.02 && Math.random()<0.06){
      const recent = state.notifications.some(n=>n.kind==='smart' && n.ticker===a.ticker && (Date.now()-new Date(n.time).getTime())<60000);
      if(!recent){
        state.notifications.unshift({id:uid(), kind:'smart', ticker:a.ticker,
          text:'Volatilidad inusual detectada en '+a.ticker+' (±'+(relVol*100).toFixed(1)+'% en la sesión)', time:new Date()});
        state.notifications = state.notifications.slice(0,30);
      }
    }
  });
}

/* ============================================================
   CÁLCULOS DE CARTERA
   ============================================================ */
function valueUSD(ticker, qty){
  const meta = getMeta(ticker);
  const p = state.prices[ticker].price;
  if(meta.type==='cedear') return (p*qty)/state.ccl;
  return p*qty;
}
function computeHoldingsEnriched(){
  return state.holdings.map(h=>{
    const meta = getMeta(h.ticker);
    const p = state.prices[h.ticker].price;
    const chgPct = state.prices[h.ticker].chgPct;
    const currentValueNative = p*h.qty;
    const costValueNative = h.avgCost*h.qty;
    const pnlNative = currentValueNative-costValueNative;
    const pnlPct = costValueNative!==0 ? (pnlNative/costValueNative)*100 : 0;
    const usdValue = valueUSD(h.ticker, h.qty);
    return {...h, meta, price:p, chgPct, currentValueNative, pnlNative, pnlPct, usdValue};
  });
}
function computePortfolioSummary(){
  const holdingsEnriched = computeHoldingsEnriched();
  const totalUSD = holdingsEnriched.reduce((s,h)=>s+h.usdValue,0);
  const totalCostUSD = holdingsEnriched.reduce((s,h)=>{
    const costNative = h.avgCost*h.qty;
    return s + (h.meta.type==='cedear' ? costNative/state.ccl : costNative);
  },0);
  const totalPnlUSD = totalUSD-totalCostUSD;
  const totalPnlPct = totalCostUSD!==0 ? (totalPnlUSD/totalCostUSD)*100 : 0;
  const dailyChangePct = holdingsEnriched.length ?
    holdingsEnriched.reduce((s,h)=>s+h.chgPct*(h.usdValue/(totalUSD||1)),0) : 0;
  const allocByType = ['accion','cedear','cripto'].map(t=>({
    name:TYPE_LABEL[t], value:holdingsEnriched.filter(h=>h.meta.type===t).reduce((s,h)=>s+h.usdValue,0), color:TYPE_COLOR[t]
  })).filter(d=>d.value>0);
  return {holdingsEnriched, totalUSD, totalPnlUSD, totalPnlPct, dailyChangePct, allocByType};
}

function tickerItemsHtml(){
  const items = ALL_ASSETS.map(a=>{
    const p = state.prices[a.ticker];
    const cur = a.currency==='ARS' ? 'AR$' : '$';
    const color = p.chgPct>=0 ? 'var(--gain)' : 'var(--loss)';
    return '<span style="display:inline-flex;align-items:center;gap:6px;padding:0 18px;font-size:12.5px;">'
      +'<span style="color:#8993A8">'+a.ticker+'</span>'
      +'<span style="color:#E8ECF2">'+cur+p.price.toLocaleString('es-AR',{maximumFractionDigits:2})+'</span>'
      +'<span style="color:'+color+'">'+fmtPct(p.chgPct)+'</span></span>';
  }).join('');
  return items+items;
}

  const el = document.getElementById('ticker-track');

function updateBestWorst(holdingsEnriched){
  const el = document.getElementById('best-worst');
  if(!el) return;
  const sorted = [...holdingsEnriched].sort((a,b)=>b.chgPct-a.chgPct);
  const best = sorted[0], worst = sorted[sorted.length-1];
  let html = '';
  if(best) html += rowBestWorst(best,true);
  if(worst && worst!==best) html += rowBestWorst(worst,false);
  el.innerHTML = html || '<div style="font-size:12px;color:var(--muted);">Sin posiciones cargadas.</div>';
}

const CLASS_ASSUMPTIONS = {
  accion:{retorno:0.09, vol:0.18, label:'Acciones USA'},
  cedear:{retorno:0.08, vol:0.22, label:'CEDEARs'},
  cripto:{retorno:0.18, vol:0.55, label:'Criptomonedas'},

};
const simAlloc = {accion:30, cedear:20, cripto:20, rentafija:30};
let simMonto = 10000, simYears = 10;

function renderSimulador(container){
  container.innerHTML =
    '<div style="display:flex;gap:18px;flex-wrap:wrap;">'
      +'<div class="ip-card" style="padding:18px;flex:1 1 300px;min-width:280px;">'

        +'<div style="margin-bottom:16px;"><label style="font-size:11px;color:var(--muted);">Horizonte: <span id="s-years-label">'+simYears+'</span> años</label>'
        +'<input class="ip-range" type="range" min="1" max="30" value="'+simYears+'" id="s-years"/></div>'
        +Object.keys(CLASS_ASSUMPTIONS).map(k=>

          +'<input class="ip-range" type="range" min="0" max="100" value="'+simAlloc[k]+'" id="s-alloc-'+k+'"/></div>'
        ).join('')
        +'<div style="font-size:11px;color:var(--amber);margin-bottom:14px;" id="s-total-label"></div>'
        +'<button class="ip-btn" id="s-run" style="width:100%;">Simular proyección</button>'
        +'<div style="font-size:11px;color:var(--muted);margin-top:12px;line-height:1.5;">Supuestos de retorno y volatilidad anual por clase de activo son ilustrativos, no una predicción ni recomendación de inversión.</div>'
      +'</div>'
      +'<div class="ip-card" style="padding:18px;flex:2 1 420px;min-width:340px;">'
        +'<div style="font-size:13px;font-weight:600;margin-bottom:10px;">Proyección de crecimiento</div>'
        +'<div id="s-result"><div style="padding:40px;text-align:center;color:var(--muted);font-size:13px;">Configurá la asignación y presioná "Simular proyección" para ver el resultado.</div></div>'
      +'</div>'
    +'</div>';

  const updateTotalLabel = ()=>{
    const total = Object.keys(CLASS_ASSUMPTIONS).reduce((s,k)=>s+simAlloc[k],0);
    document.getElementById('s-total-label').textContent = 'Suma de asignación: '+total+'%'+(total!==100?' (se normaliza automáticamente al calcular)':'');
    document.getElementById('s-total-label').style.color = total===100 ? 'var(--gain)' : 'var(--amber)';
  };
  document.getElementById('s-monto').addEventListener('input', e=>{ simMonto = parseFloat(e.target.value)||0; });
  document.getElementById('s-years').addEventListener('input', e=>{ simYears = parseInt(e.target.value); document.getElementById('s-years-label').textContent = simYears; });
  Object.keys(CLASS_ASSUMPTIONS).forEach(k=>{
    document.getElementById('s-alloc-'+k).addEventListener('input', e=>{
      simAlloc[k] = parseInt(e.target.value);
      document.getElementById('s-alloc-'+k+'-label').textContent = simAlloc[k]+'%';
      updateTotalLabel();
    });
  });
  document.getElementById('s-run').addEventListener('click', runSimulador);
  updateTotalLabel();
}
function runSimulador(){
  const total = Object.keys(CLASS_ASSUMPTIONS).reduce((s,k)=>s+simAlloc[k],0) || 1;
  const w = {}; Object.keys(CLASS_ASSUMPTIONS).forEach(k=> w[k]=simAlloc[k]/total);
  const portReturn = Object.keys(w).reduce((s,k)=>s+w[k]*CLASS_ASSUMPTIONS[k].retorno,0);
  const portVol = Math.sqrt(Object.keys(w).reduce((s,k)=>s+(w[k]*CLASS_ASSUMPTIONS[k].vol)**2,0));
  const data = [];
  for(let y=0;y<=simYears;y++){
    const base = simMonto*Math.pow(1+portReturn,y);
    const spread = base*portVol*Math.sqrt(y)*0.9;
    data.push({year:y, pesimista:Math.max(base-spread,0), base, optimista:base+spread});
  }
  const final = data[data.length-1];
  const resEl = document.getElementById('s-result');
  resEl.innerHTML =
    '<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">'
    +metricCardHtml('sr-ret','Retorno anual esperado', fmtPct(portReturn*100))
    +metricCardHtml('sr-vol','Volatilidad anual', fmtPct(portVol*100))
    +metricCardHtml('sr-final','Valor estimado a '+simYears+' años', fmtMoney(final.base,'USD'))
    +'</div>'
    +'<div style="position:relative;height:280px;"><canvas id="chart-sim" role="img" aria-label="Proyección de crecimiento de la cartera simulada">Proyección optimista, base y pesimista a lo largo de los años.</canvas></div>';

  if(chartSim) chartSim.destroy();
  chartSim = new Chart(document.getElementById('chart-sim'), {
    type:'line',
    data:{ labels:data.map(d=>d.year),
      datasets:[
        {label:'Optimista', data:data.map(d=>d.optimista), borderColor:'#3DDC84', borderDash:[4,3], borderWidth:1.5, pointRadius:0},
        {label:'Escenario base', data:data.map(d=>d.base), borderColor:'#5B8DEF', borderWidth:2, pointRadius:0},
        {label:'Pesimista', data:data.map(d=>d.pesimista), borderColor:'#FF5C5C', borderDash:[4,3], borderWidth:1.5, pointRadius:0},
      ]},
    options:{ responsive:true, maintainAspectRatio:false,
      scales:{ x:{title:{display:true,text:'Años',color:'#8993A8'}, ticks:{color:'#8993A8'}, grid:{color:'#232B3D'}},
               y:{ticks:{color:'#8993A8', callback:(v)=>'$'+(v/1000).toFixed(0)+'k'}, grid:{color:'#232B3D'}} },
      plugins:{ legend:{labels:{color:'#8993A8', font:{size:11}}}, tooltip:{callbacks:{label:(c)=>c.dataset.label+': '+fmtMoney(c.raw,'USD')}} } }
  });
}

/* ============================================================
   BACKTESTING
   ============================================================ */
function runBacktest(asset, days, strategy){
  const driftAnnual = asset.type==='cripto' ? 0.25 : asset.type==='cedear' ? 0.10 : 0.09;
  const vol = asset.vol ? asset.vol*Math.sqrt(252)*0.55 : 0.2;
  const hist = genHistory(asset.ticker+'_bt', days, driftAnnual, vol, 100);
  const prices = hist.map(h=>h.price);
  const sma = (arr, period, idx)=>{ if(idx<period-1) return null; let s=0; for(let i=idx-period+1;i<=idx;i++) s+=arr[i]; return s/period; };

  let position=0, cash=10000, equity=[];
  let bhShares = 10000/prices[0];
  for(let i=0;i<prices.length;i++){
    const price = prices[i];
    if(strategy==='buyhold'){
      if(i===0){ position = cash/price; cash=0; }
    } else {
      const smaFast = sma(prices,20,i), smaSlow = sma(prices,50,i);
      if(smaFast!=null && smaSlow!=null){
        if(smaFast>smaSlow && position===0){ position = cash/price; cash=0; }
        else if(smaFast<smaSlow && position>0){ cash = position*price; position=0; }
      }
    }
    const eqVal = strategy==='buyhold' ? position*price : (cash+position*price);
    equity.push({t:i, equity:eqVal, benchmark: bhShares*price});
  }
  const finalEq = equity[equity.length-1].equity;
  const totalReturn = (finalEq/10000-1)*100;
  const yearsFrac = days/252;
  const cagr = (Math.pow(finalEq/10000, 1/yearsFrac)-1)*100;
  let peak=-Infinity, maxDD=0;
  equity.forEach(e=>{ peak=Math.max(peak,e.equity); maxDD=Math.min(maxDD,(e.equity-peak)/peak); });
  const dailyReturns=[];
  for(let i=1;i<equity.length;i++) dailyReturns.push(equity[i].equity/equity[i-1].equity-1);
  const meanR = dailyReturns.reduce((s,v)=>s+v,0)/dailyReturns.length;
  const stdR = Math.sqrt(dailyReturns.reduce((s,v)=>s+(v-meanR)**2,0)/dailyReturns.length);
  const annVol = stdR*Math.sqrt(252)*100;
  return {equity, totalReturn, cagr, maxDD:maxDD*100, annVol};
}

  container.innerHTML =

      +'<div class="ip-card" style="padding:18px;flex:2 1 420px;min-width:340px;">'
        +'<div style="font-size:13px;font-weight:600;margin-bottom:10px;">Curva de resultados</div>'
        +'<div id="bt-result"><div style="padding:40px;text-align:center;color:var(--muted);font-size:13px;">Elegí un activo, una estrategia y un período, y ejecutá el backtest.</div></div>'
      +'</div>'
    +'</div>';
  document.getElementById('bt-run').addEventListener('click', ()=>{
    const ticker = document.getElementById('bt-ticker').value;
    const strategy = document.getElementById('bt-strategy').value;
    const period = parseInt(document.getElementById('bt-period').value);
    const asset = getMeta(ticker);
    const result = runBacktest(asset, period, strategy);
    const resEl = document.getElementById('bt-result');
    resEl.innerHTML =
      '<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">'
      +metricCardHtml('bt-tr','Retorno total', fmtPct(result.totalReturn), undefined, result.totalReturn>=0?'var(--gain)':'var(--loss)')
      +metricCardHtml('bt-cagr','CAGR', fmtPct(result.cagr))
      +metricCardHtml('bt-dd','Máx. drawdown', fmtPct(result.maxDD), undefined, 'var(--loss)')
      +metricCardHtml('bt-vol','Volatilidad anual.', fmtPct(result.annVol))
      +'</div>'
      +'<div style="position:relative;height:260px;"><canvas id="chart-bt" role="img" aria-label="Curva de resultados del backtest comparada con comprar y mantener">Curva de equity de la estrategia frente al benchmark de comprar y mantener.</canvas></div>';
    if(chartBt) chartBt.destroy();
    chartBt = new Chart(document.getElementById('chart-bt'), {
      type:'line',
      data:{ labels:result.equity.map(e=>e.t),
        datasets:[
          {label:'Estrategia', data:result.equity.map(e=>e.equity), borderColor:'#F5B942', borderWidth:2, pointRadius:0},
          {label:'Comprar y mantener', data:result.equity.map(e=>e.benchmark), borderColor:'#5B8DEF', borderDash:[4,3], borderWidth:1.5, pointRadius:0},
        ]},
      options:{ responsive:true, maintainAspectRatio:false,
        scales:{ x:{title:{display:true,text:'Días de trading',color:'#8993A8'}, ticks:{color:'#8993A8', maxTicksLimit:10}, grid:{color:'#232B3D'}},
                 y:{ticks:{color:'#8993A8'}, grid:{color:'#232B3D'}} },
        plugins:{ legend:{labels:{color:'#8993A8', font:{size:11}}}, tooltip:{callbacks:{label:(c)=>c.dataset.label+': '+fmtMoney(c.raw,'USD')}} } }
    });
  });
}

/* ============================================================
   ALERTAS
   ============================================================ */
function renderAlertas(container){
  container.innerHTML =
    '<div style="display:flex;gap:18px;flex-wrap:wrap;">'
      +'<div style="flex:1 1 320px;min-width:300px;">'
        +'<div class="ip-card" style="padding:16px;margin-bottom:16px;">'
          +'<div style="font-size:13px;font-weight:600;margin-bottom:12px;">Crear alerta de precio</div>'
          +'<div style="display:flex;flex-direction:column;gap:10px;">'
            +'<select class="ip-select" id="a-ticker">'+ALL_ASSETS.map(a=>'<option value="'+a.ticker+'">'+a.ticker+' · '+a.name+'</option>').join('')+'</select>'
            +'<select class="ip-select" id="a-cond"><option value="gt">Precio mayor o igual a</option><option value="lt">Precio menor o igual a</option></select>'
            +'<input class="ip-input" type="number" id="a-value" placeholder="Valor umbral"/>'
            +'<button class="ip-btn" id="a-add" style="display:flex;align-items:center;justify-content:center;gap:6px;">'+icon('plus',14)+' Crear alerta</button>'
          +'</div>'
        +'</div>'
        +'<div class="ip-card" style="padding:16px;">'
          +'<div style="font-size:13px;font-weight:600;margin-bottom:10px;">Alertas activas</div>'
          +'<div id="a-list"></div>'
        +'</div>'
      +'</div>'
      +'<div class="ip-card" style="padding:16px;flex:1 1 320px;min-width:300px;">'
        +'<div style="font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px;">'+icon('sparkles',14,'var(--amber)')+' Notificaciones y alertas inteligentes</div>'
        +'<div id="n-list"></div>'
      +'</div>'
    +'</div>';
  document.getElementById('a-add').addEventListener('click', ()=>{
    const ticker = document.getElementById('a-ticker').value;
    const cond = document.getElementById('a-cond').value;
    const value = parseFloat(document.getElementById('a-value').value);
    if(!value || value<=0) return;
    state.alerts.push({id:uid(), ticker, cond, value, active:true});
    document.getElementById('a-value').value='';
    updateAlertsList();
  });
  updateAlertsList();
  updateNotifList();
}
function updateAlertsList(){
  const el = document.getElementById('a-list');
  if(!el) return;
  if(state.alerts.length===0){ el.innerHTML = '<div style="font-size:12px;color:var(--muted);">No hay alertas configuradas.</div>'; return; }
  el.innerHTML = state.alerts.map(a=>
    '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);opacity:'+(a.active?1:0.45)+';">'
    +'<div style="font-size:12.5px;"><span style="font-weight:500;">'+a.ticker+'</span> '+(a.cond==='gt'?'≥':'≤')+' '+a.value
    +' <span class="ip-mono" style="color:var(--muted);margin-left:8px;">(actual: '+state.prices[a.ticker].price.toFixed(2)+')</span></div>'
    +'<div style="display:flex;gap:8px;">'
    +'<button class="ip-btn-ghost a-toggle" data-id="'+a.id+'" style="padding:4px 8px;font-size:11px;">'+(a.active?'Pausar':'Activar')+'</button>'
    +'<button class="a-del" data-id="'+a.id+'" style="background:none;border:none;cursor:pointer;color:var(--muted);">'+icon('trash',13)+'</button>'
    +'</div></div>'
  ).join('');
  el.querySelectorAll('.a-toggle').forEach(btn=>btn.addEventListener('click', ()=>{
    state.alerts = state.alerts.map(a=> a.id===btn.dataset.id ? {...a, active:!a.active} : a);
    updateAlertsList();
  }));
  el.querySelectorAll('.a-del').forEach(btn=>btn.addEventListener('click', ()=>{
    state.alerts = state.alerts.filter(a=>a.id!==btn.dataset.id);
    updateAlertsList();
  }));
}
function updateNotifList(){
  const el = document.getElementById('n-list');
  if(!el) return;
  if(state.notifications.length===0){
    el.innerHTML = '<div style="font-size:12px;color:var(--muted);">Sin novedades por ahora. Las alertas inteligentes detectan automáticamente picos de volatilidad.</div>';
    return;
  }
  el.innerHTML = state.notifications.map(n=>
    '<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);">'
    +icon(n.kind==='smart'?'sparkles':'warning',14,n.kind==='smart'?'var(--amber)':'var(--blue)')
    +'<div><div style="font-size:12.5px;">'+esc(n.text)+'</div>'
    +'<div style="font-size:10.5px;color:var(--muted);display:flex;align-items:center;gap:4px;margin-top:2px;">'+icon('clock',10)+' '+new Date(n.time).toLocaleTimeString('es-AR')+'</div></div>'
    +'</div>'
  ).join('');
}

/* ============================================================
   NOTICIAS
   ============================================================ */
function renderNoticias(container){
  container.innerHTML =
    '<div class="ip-card" style="padding:16px;margin-bottom:18px;border-left:3px solid var(--amber);">'
      +'<div style="font-size:13px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px;">'+icon('sparkles',14,'var(--amber)')+' Resumen del día, generado por IA</div>'
      +'<p style="font-size:13px;color:var(--muted);line-height:1.6;margin:0;">Las bolsas globales operan con tono cauto: Wall Street retrocede por dudas sobre la sostenibilidad de las valuaciones ligadas a IA, mientras Europa consolida tras varias jornadas de récords. En Argentina, el dólar financiero se mantiene estable con volatilidad mínima. El petróleo sigue contenido tras un nuevo aumento de producción de la OPEP+, y Bitcoin se debate en una zona técnica clave.</p>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;">'
    +NEWS_ITEMS.map(n=>
      '<div class="ip-card" style="padding:16px;">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">'
      +'<span class="ip-badge" style="background:var(--surface2);color:var(--blue);">'+n.cat+'</span>'
      +'<span style="font-size:11px;color:var(--muted);">'+n.time+'</span></div>'
      +'<div style="font-size:14px;font-weight:600;margin-bottom:6px;line-height:1.35;">'+n.title+'</div>'
      +'<p style="font-size:12.5px;color:var(--muted);line-height:1.55;margin:0 0 8px;">'+n.summary+'</p>'
      +'<div style="font-size:11px;color:var(--muted);">Fuente: '+n.source+'</div>'
      +'</div>'
    ).join('')
    +'</div>';
}

/* ============================================================
   INICIO
   ============================================================ */
render();
syncCrypto();
setInterval(tickPrices, 2800);
setInterval(syncCrypto, 45000);
</script>
